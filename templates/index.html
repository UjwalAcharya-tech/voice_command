<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Calculator Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <div class="chip">Voice ready</div>
    <h1>🎤 AI Voice Calculator</h1>
    <p class="hint">Tap the mic, speak a math expression (e.g., "12 divided by 3"), and hear the answer.</p>

    <div class="controls">
        <button id="voiceButton" onclick="toggleVoice()">Start Listening</button>
        <span id="status" class="status">Idle</span>
    </div>

    <div class="output">
        <p><strong>Heard:</strong> <span id="command">—</span></p>
        <p><strong>Expression:</strong> <span id="expression">—</span></p>
        <p><strong>Result:</strong> <span id="result">—</span></p>
    </div>

    <p id="error" class="error"></p>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
let recognition;
let listening = false;

function initRecognition() {
    if (!SpeechRecognition) {
        setError('Your browser does not support speech recognition. Try Chrome desktop.');
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => updateStatus('Listening…');
    recognition.onend = () => {
        listening = false;
        updateStatus('Idle');
        updateButton();
    };
    recognition.onerror = (event) => {
        setError(event.error || 'Speech recognition error');
        listening = false;
        updateButton();
    };
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        sendCommand(transcript);
    };
}

function toggleVoice() {
    clearError();
    if (!recognition) {
        initRecognition();
    }
    if (!recognition) return;

    if (listening) {
        recognition.stop();
        return;
    }

    listening = true;
    updateButton();
    updateStatus('Listening…');
    recognition.start();
}

function updateButton() {
    const btn = document.getElementById('voiceButton');
    btn.textContent = listening ? 'Stop' : 'Start Listening';
}

function updateStatus(text) {
    document.getElementById('status').textContent = text;
}

function setError(msg) {
    document.getElementById('error').textContent = msg;
}

function clearError() {
    setError('');
}

async function sendCommand(command) {
    document.getElementById('command').textContent = command;
    document.getElementById('expression').textContent = '—';
    document.getElementById('result').textContent = '…';

    try {
        const response = await fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command })
        });
        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || 'Unable to calculate');
        }

        document.getElementById('expression').textContent = data.expression;
        document.getElementById('result').textContent = data.result;
        speak(`The answer is ${data.result}`);
    } catch (err) {
        setError(err.message);
        document.getElementById('result').textContent = '—';
    }
}

function speak(text) {
    if (!synth) return;
    const utterance = new SpeechSynthesisUtterance(text);
    synth.cancel();
    synth.speak(utterance);
}

updateButton();
updateStatus('Idle');
</script>

</body>
</html>
